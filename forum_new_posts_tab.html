<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAE 论坛 - 最新帖子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* Tab 导航栏样式 */
        .tab-nav {
            display: flex;
            border-bottom: 1px solid #e8e8e8;
            background-color: #fafafa;
            border-radius: 8px 8px 0 0;
            padding: 0 20px;
        }

        .tab-item {
            position: relative;
            padding: 16px 24px;
            cursor: pointer;
            font-size: 15px;
            color: #666;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-item:hover {
            color: #333;
            background-color: #f0f0f0;
        }

        .tab-item.active {
            color: #00b96b;
            border-bottom-color: #00b96b;
            font-weight: 500;
        }

        /* 数量徽章样式 */
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            background-color: #ff4d4f;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            border-radius: 10px;
            animation: pulse 2s infinite;
        }

        .tab-item.active .badge {
            background-color: #00b96b;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        /* 加载状态 */
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #e0e0e0;
            border-top-color: #00b96b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 内容区域 */
        .tab-content {
            padding: 20px;
            min-height: 400px;
        }

        .content-panel {
            display: none;
        }

        .content-panel.active {
            display: block;
        }

        /* 帖子列表样式 */
        .topic-list {
            list-style: none;
        }

        .topic-item {
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .topic-item:last-child {
            border-bottom: none;
        }

        .topic-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #e8e8e8;
            flex-shrink: 0;
        }

        .topic-info {
            flex: 1;
        }

        .topic-title {
            font-size: 15px;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .topic-meta {
            font-size: 13px;
            color: #999;
            display: flex;
            gap: 16px;
        }

        .topic-stats {
            display: flex;
            gap: 16px;
            color: #999;
            font-size: 13px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 错误提示 */
        .error-message {
            padding: 40px;
            text-align: center;
            color: #ff4d4f;
        }

        /* 刷新按钮 */
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #00b96b;
            color: #fff;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 185, 107, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .refresh-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(0, 185, 107, 0.5);
        }

        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Tab 导航栏 -->
        <nav class="tab-nav">
            <div class="tab-item active" data-tab="new">
                <span>新</span>
                <span class="badge" id="newPostsBadge">
                    <span class="loading"></span>
                </span>
            </div>
            <div class="tab-item" data-tab="latest">最新</div>
            <div class="tab-item" data-tab="unread">
                <span>未读</span>
                <span class="badge" style="display: none;">4</span>
            </div>
            <div class="tab-item" data-tab="hot">热门</div>
            <div class="tab-item" data-tab="ranking">排行榜</div>
            <div class="tab-item" data-tab="categories">类别</div>
        </nav>

        <!-- 内容区域 -->
        <div class="tab-content">
            <div class="content-panel active" id="newPanel">
                <ul class="topic-list" id="topicList">
                    <li class="topic-item">
                        <div class="topic-avatar"></div>
                        <div class="topic-info">
                            <div class="topic-title">正在加载最新帖子...</div>
                        </div>
                    </li>
                </ul>
            </div>
            <div class="content-panel" id="latestPanel">
                <p style="text-align: center; color: #999; padding: 40px;">最新内容</p>
            </div>
            <div class="content-panel" id="unreadPanel">
                <p style="text-align: center; color: #999; padding: 40px;">未读内容</p>
            </div>
            <div class="content-panel" id="hotPanel">
                <p style="text-align: center; color: #999; padding: 40px;">热门内容</p>
            </div>
            <div class="content-panel" id="rankingPanel">
                <p style="text-align: center; color: #999; padding: 40px;">排行榜内容</p>
            </div>
            <div class="content-panel" id="categoriesPanel">
                <p style="text-align: center; color: #999; padding: 40px;">类别内容</p>
            </div>
        </div>
    </div>

    <!-- 刷新按钮 -->
    <button class="refresh-btn" id="refreshBtn" title="刷新数据">↻</button>

    <script>
        /**
         * 论坛数据管理器
         * 负责获取和更新论坛统计数据
         */
        class ForumDataManager {
            constructor() {
                this.apiBaseUrl = 'https://forum.trae.cn';
                this.cache = new Map();
                this.cacheExpiry = 5 * 60 * 1000; // 5分钟缓存
            }

            /**
             * 获取论坛统计数据
             * @returns {Promise<Object>} 统计数据对象
             */
            async getStats() {
                const cacheKey = 'forum_stats';
                const cached = this.getCache(cacheKey);
                
                if (cached) {
                    console.log('[ForumDataManager] 使用缓存数据:', cached);
                    return cached;
                }

                try {
                    console.log('[ForumDataManager] 正在获取论坛统计数据...');
                    const response = await fetch(`${this.apiBaseUrl}/about.json`);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    const stats = data.about?.stats || {};
                    
                    // 缓存数据
                    this.setCache(cacheKey, stats);
                    
                    console.log('[ForumDataManager] 获取成功:', stats);
                    return stats;
                } catch (error) {
                    console.error('[ForumDataManager] 获取统计数据失败:', error);
                    throw error;
                }
            }

            /**
             * 获取最新帖子列表
             * @returns {Promise<Array>} 帖子列表
             */
            async getLatestTopics() {
                try {
                    const response = await fetch(`${this.apiBaseUrl}/latest.json`);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    return data.topic_list?.topics || [];
                } catch (error) {
                    console.error('[ForumDataManager] 获取帖子列表失败:', error);
                    throw error;
                }
            }

            /**
             * 获取缓存数据
             * @private
             */
            getCache(key) {
                const item = this.cache.get(key);
                if (item && Date.now() - item.timestamp < this.cacheExpiry) {
                    return item.data;
                }
                this.cache.delete(key);
                return null;
            }

            /**
             * 设置缓存数据
             * @private
             */
            setCache(key, data) {
                this.cache.set(key, {
                    data,
                    timestamp: Date.now()
                });
            }

            /**
             * 清除缓存
             */
            clearCache() {
                this.cache.clear();
                console.log('[ForumDataManager] 缓存已清除');
            }
        }

        /**
         * Tab 控制器
         * 管理 Tab 切换和数据显示
         */
        class TabController {
            constructor(dataManager) {
                this.dataManager = dataManager;
                this.currentTab = 'new';
                this.init();
            }

            /**
             * 初始化
             */
            init() {
                this.bindEvents();
                this.loadData();
            }

            /**
             * 绑定事件
             */
            bindEvents() {
                // Tab 切换事件
                document.querySelectorAll('.tab-item').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        const tabName = e.currentTarget.dataset.tab;
                        this.switchTab(tabName);
                    });
                });

                // 刷新按钮事件
                document.getElementById('refreshBtn').addEventListener('click', () => {
                    this.refreshData();
                });
            }

            /**
             * 切换 Tab
             */
            switchTab(tabName) {
                // 更新 Tab 样式
                document.querySelectorAll('.tab-item').forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.dataset.tab === tabName) {
                        tab.classList.add('active');
                    }
                });

                // 更新内容面板
                document.querySelectorAll('.content-panel').forEach(panel => {
                    panel.classList.remove('active');
                });
                document.getElementById(`${tabName}Panel`).classList.add('active');

                this.currentTab = tabName;
            }

            /**
             * 加载数据
             */
            async loadData() {
                try {
                    // 获取统计数据
                    const stats = await this.dataManager.getStats();
                    this.updateNewPostsBadge(stats.topics_last_day || 0);

                    // 获取帖子列表
                    const topics = await this.dataManager.getLatestTopics();
                    this.renderTopicList(topics);
                } catch (error) {
                    this.showError('数据加载失败，请稍后重试');
                }
            }

            /**
             * 刷新数据
             */
            async refreshData() {
                const refreshBtn = document.getElementById('refreshBtn');
                refreshBtn.classList.add('spinning');

                // 清除缓存
                this.dataManager.clearCache();

                try {
                    await this.loadData();
                    console.log('[TabController] 数据已刷新');
                } catch (error) {
                    console.error('[TabController] 刷新失败:', error);
                } finally {
                    setTimeout(() => {
                        refreshBtn.classList.remove('spinning');
                    }, 500);
                }
            }

            /**
             * 更新新帖数量徽章
             */
            updateNewPostsBadge(count) {
                const badge = document.getElementById('newPostsBadge');
                
                if (count > 0) {
                    badge.textContent = count > 999 ? '999+' : count;
                    badge.style.display = 'inline-flex';
                    
                    // 添加动画效果
                    badge.style.animation = 'none';
                    setTimeout(() => {
                        badge.style.animation = 'pulse 2s infinite';
                    }, 10);
                } else {
                    badge.style.display = 'none';
                }
            }

            /**
             * 渲染帖子列表
             */
            renderTopicList(topics) {
                const listContainer = document.getElementById('topicList');
                
                if (!topics || topics.length === 0) {
                    listContainer.innerHTML = '<li class="topic-item"><div class="topic-info"><div class="topic-title">暂无帖子</div></div></li>';
                    return;
                }

                const html = topics.slice(0, 10).map(topic => `
                    <li class="topic-item">
                        <div class="topic-avatar" style="background-image: url('${topic.image_url || ''}'); background-size: cover;"></div>
                        <div class="topic-info">
                            <div class="topic-title">${this.escapeHtml(topic.title)}</div>
                            <div class="topic-meta">
                                <span>${topic.posts_count || 0} 回复</span>
                                <span>${topic.views || 0} 浏览</span>
                                <span>${topic.like_count || 0} 赞</span>
                            </div>
                        </div>
                    </li>
                `).join('');

                listContainer.innerHTML = html;
            }

            /**
             * 显示错误信息
             */
            showError(message) {
                const listContainer = document.getElementById('topicList');
                listContainer.innerHTML = `<li class="topic-item"><div class="topic-info"><div class="topic-title" style="color: #ff4d4f;">${message}</div></div></li>`;
            }

            /**
             * HTML 转义
             */
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            const dataManager = new ForumDataManager();
            const tabController = new TabController(dataManager);

            // 自动刷新（每5分钟）
            setInterval(() => {
                tabController.refreshData();
            }, 5 * 60 * 1000);

            console.log('[App] 论坛 Tab 控制器已初始化');
        });
    </script>
</body>
</html>
