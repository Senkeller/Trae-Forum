name: Flutter Analyze

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run Flutter Analyze
        run: |
          echo "Running Flutter Analyze..."
          flutter analyze --fatal-infos --fatal-warnings 2>&1 | tee analyze_output.txt || true

      - name: Check for errors
        run: |
          echo "Checking for errors and warnings..."
          ERRORS=$(grep -c "^  error" analyze_output.txt || true)
          WARNINGS=$(grep -c "^  warning" analyze_output.txt || true)

          echo "Errors: $ERRORS"
          echo "Warnings: $WARNINGS"

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ Found $ERRORS error(s). Please fix them."
            exit 1
          fi

          if [ "$WARNINGS" -gt 0 ]; then
            echo "❌ Found $WARNINGS warning(s). Please fix them."
            exit 1
          fi

          echo "✅ No errors or warnings found!"

      - name: Upload analysis results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-results
          path: analyze_output.txt
