name: traeu
description: "TRAE Forum Flutter App - A community forum application based on CoolApk"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # 网络请求
  dio: ^5.4.3+1
  http: ^1.2.1
  
  # 本地存储
  hive_ce: ^2.11.2
  shared_preferences: ^2.2.3
  
  # 图片加载
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0
  
  # 路由管理
  go_router: ^14.1.4
  
  # 代码生成
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
  # UI 工具
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  
  # 其他工具
  path_provider: ^2.1.3
  url_launcher: ^6.2.6
  share_plus: ^10.0.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.3
  
  # 富文本渲染
  flutter_html: ^3.0.0-beta.2

  # WebView
  webview_flutter: ^4.8.0
  webview_flutter_android: ^3.16.8
  webview_flutter_wkwebview: ^3.14.0

  # 日志
  logger: ^2.3.0
  
  # 时间处理
  intl: ^0.19.0
  
  # 加密
  crypto: ^3.0.3
  
  # 文件操作
  path: ^1.9.0
  
  # 图片压缩
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # 代码生成工具 - 使用兼容版本
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_ce_generator: ^1.9.0
  
  # 测试
  mockito: ^5.4.5
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter
  
  # 发布准备
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true
  
  # 资源文件
  assets:
    - assets/images/
    - assets/icons/
    - assets/emojis/
  

